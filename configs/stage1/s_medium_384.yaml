# Stage 1: Teacher → Student S_N (size reduction)
# Student: Conformer S-Medium (384 dim, 12 layers, ~28M params)
# Teacher: omniASR_CTC_300M_v2 (frozen)

model:
  arch: "distill_s_medium"

teacher:
  name: "omniASR_CTC_300M_v2"

dataset:
  name: "cv_swc_rvg1_de"
  train_split: "train"
  valid_split: "dev"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "/nfs1/scratch/students/witzlch88229/data/omni-asr-ft/cv_swc_rvg1_de/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5
    fragment_loading:
      cache: true
  asr_task_config:
    min_audio_len: 32_000       # ~2s at 16kHz
    max_audio_len: 960_000      # ~60s at 16kHz
    max_num_elements: 15_360_000
    batch_shuffle_window: 1
    normalize_audio: true
    example_shuffle_window: 1

tokenizer:
  name: "omniASR_tokenizer_written_v2"

optimizer:
  config:
    lr: 3e-4
    betas: [0.9, 0.98]
    weight_decay: 0.01

lr_scheduler:
  config:
    stage_ratio: [0.1, 0.4, 0.5]
    start_lr_scale: 0.01
    final_lr_scale: 0.05

trainer:
  mixed_precision:
    dtype: "torch.bfloat16"
  grad_accumulation:
    num_batches: 4

# Distillation
lambda_ctc: 0.3
lambda_kd: 0.3
lambda_hid: 0.4
temperature: 3.0
layer_mapping_strategy: "double_plus_one"

common:
  metric_recorders:
    wandb:
      enabled: true
      project: "omni-asr-distil"
      run_name: "stage1-s_medium-384"
    tensorboard:
      enabled: false

regime:
  num_steps: 50_000
  validate_after_n_steps: 1_000
  validate_every_n_steps: 200
  checkpoint_every_n_steps: 5_000
  publish_metrics_every_n_steps: 100
  save_model_only: false
