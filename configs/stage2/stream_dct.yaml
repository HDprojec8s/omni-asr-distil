# Stage 2: S_N → S_S (streaming conversion via Dynamic Chunk Training)
# Teacher: Stage 1 output (S_N, frozen)
# Student: S_S initialized from S_N, with chunked/causal attention
# Chunk sizes sampled randomly: {16, 24, 32, 48, 64, ∞}

model:
  name: ""  # Will be loaded from Stage 1 checkpoint
  arch: "distill_s_medium"

teacher:
  name: ""  # Stage 1 checkpoint path (set via CLI or override)

dataset:
  name: "cv_swc_rvg1_de"
  train_split: "train"
  valid_split: "dev"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "/nfs1/scratch/students/witzlch88229/data/omni-asr-ft/cv_swc_rvg1_de/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5
    fragment_loading:
      cache: true
  asr_task_config:
    min_audio_len: 32_000
    max_audio_len: 960_000
    max_num_elements: 15_360_000
    batch_shuffle_window: 1
    normalize_audio: true
    example_shuffle_window: 1

tokenizer:
  name: "omniASR_tokenizer_written_v2"

optimizer:
  config:
    lr: 1e-4
    betas: [0.9, 0.98]
    weight_decay: 0.01

lr_scheduler:
  config:
    stage_ratio: [0.1, 0.4, 0.5]
    start_lr_scale: 0.01
    final_lr_scale: 0.05

trainer:
  mixed_precision:
    dtype: "torch.bfloat16"
  grad_accumulation:
    num_batches: 4

# Stage 2: more weight on logit KD, less on hidden
lambda_ctc: 0.3
lambda_kd: 0.5
lambda_hid: 0.2
temperature: 2.0
layer_mapping_strategy: "double_plus_one"

# Streaming config
streaming:
  chunk_sizes: [16, 24, 32, 48, 64]
  eval_chunk_size: 48
  full_context_prob: 0.1
  causal_conv: true

common:
  metric_recorders:
    wandb:
      enabled: true
      project: "omni-asr-distil"
      run_name: "stage2-dct-s_medium"
    tensorboard:
      enabled: false

regime:
  num_steps: 20_000
  validate_after_n_steps: 2_000
  validate_every_n_steps: 1_000
  checkpoint_every_n_steps: 2_000
  publish_metrics_every_n_steps: 100
  save_model_only: false
